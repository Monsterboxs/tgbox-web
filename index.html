<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tgbox</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #007aff);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg-color: var(--tg-theme-secondary-bg-color, #f2f2f7);
            
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --title-gradient: linear-gradient(135deg, #000000 0%, #007aff 100%);
        }

        body { 
            margin: 0; 
            background-color: var(--secondary-bg-color); 
            color: var(--text-color); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* 🌟 全局动态环境光背景 */
        .dynamic-global-bg {
            position: fixed;
            top: -15%; left: -15%; 
            width: 130%; height: 130%;
            z-index: -5; 
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.65) saturate(1.5); 
            opacity: 0.6; 
            transition: background-image 1s ease-in-out; 
        }

        .header { padding: 24px 20px 10px; }
        .header-title {
            font-size: 38px; font-weight: 800; letter-spacing: -1px;
            background: var(--title-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;
        }

        .search-container { 
            padding: 10px 20px; position: sticky; top: 0; z-index: 100; background: rgba(var(--secondary-bg-color), 0.5); 
        }
        .search-box { 
            width: 100%; box-sizing: border-box; background: var(--glass-bg); border: 1px solid var(--glass-border); 
            box-shadow: var(--glass-shadow); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 20px; padding: 14px 20px; font-size: 16px; color: var(--text-color); outline: none; 
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .search-box:focus { transform: scale(1.02); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08); }
        .search-box::placeholder { color: var(--hint-color); font-weight: 500; }

        .list-header { padding: 16px 24px 10px; font-size: 14px; font-weight: 600; color: var(--hint-color); }
        
        /* 🌟 网格海报墙布局 */
        .list-section { 
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px; 
            padding: 0 20px 40px; 
        }

        /* 🌟 极简卡片 */
        .list-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            cursor: pointer; 
            transition: transform 0.1s ease;
            background: transparent; 
            border: none;
            box-shadow: none;
            padding: 0;
            margin-bottom: 10px;
        }
        .list-item:active { transform: scale(0.95); }
        
        /* 🌟 2:3 海报画框 */
        .item-icon-wrapper {
            position: relative;
            width: 100%; 
            aspect-ratio: 2 / 3; 
            border-radius: 12px; 
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            overflow: hidden; 
            background-color: rgba(150, 150, 150, 0.15);
            margin-bottom: 10px; 
            flex-shrink: 0; 
        }
        
        /* 🌟 底层氛围感模糊背景 */
        .item-icon-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; filter: blur(12px) brightness(0.85); transform: scale(1.2); z-index: 1;
        }

        /* 🌟 顶层清晰原图 (完整缩放包含) */
        .item-icon-img { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; z-index: 2;
        }
        
        /* 🌟 海报下方文字区域 */
        .item-content { width: 100%; text-align: center; }
        .item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; letter-spacing: 0.5px;}
        .item-desc { font-size: 13px; color: var(--hint-color); font-weight: 400; font-family: 'Courier New', Courier, monospace; }

        #loading { grid-column: 1 / -1; text-align: center; padding: 40px 20px; color: var(--hint-color); font-size: 15px; font-weight: 500;}
    </style>
</head>
<body>

    <div id="dynamicGlobalBg" class="dynamic-global-bg"></div>

    <div class="header">
        <div class="header-title">Tgbox</div>
    </div>
    
    <div class="search-container">
        <input type="text" class="search-box" placeholder="🔍 探索影视宇宙..." id="searchInput">
    </div>

    <div class="list-header" id="listTitle">✨ 最新入库</div>
    <div class="list-section" id="resourceList">
        <div id="loading">🚀 正在连通影视数据库...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function applyTheme() {
            if (tg.colorScheme === 'dark') {
                document.documentElement.style.setProperty('--glass-bg', 'rgba(30, 30, 30, 0.65)');
                document.documentElement.style.setProperty('--glass-border', 'rgba(255, 255, 255, 0.08)');
                document.documentElement.style.setProperty('--glass-shadow', '0 8px 32px rgba(0, 0, 0, 0.3)');
                document.documentElement.style.setProperty('--title-gradient', 'linear-gradient(135deg, #ffffff 0%, #a8c0ff 100%)');
            } else {
                document.documentElement.style.setProperty('--glass-bg', 'rgba(255, 255, 255, 0.75)');
                document.documentElement.style.setProperty('--glass-border', 'rgba(255, 255, 255, 0.6)');
                document.documentElement.style.setProperty('--glass-shadow', '0 8px 32px rgba(0, 0, 0, 0.04)');
                document.documentElement.style.setProperty('--title-gradient', 'linear-gradient(135deg, #000000 0%, var(--button-color) 100%)');
            }
        }
        tg.onEvent('themeChanged', applyTheme);
        applyTheme(); 

        let allMovies = [];
        
        const dbUrl = `https://monsterboxs.github.io/tgbox-web/database.json?t=${new Date().getTime()}`;

        fetch(dbUrl)
            .then(response => {
                if (!response.ok) throw new Error("File not found");
                return response.json();
            })
            .then(data => {
                allMovies = data;
                renderList(allMovies.slice(0, 50)); 
                
                // 🌟 抽取最新资源海报作为全局背景
                if (allMovies.length > 0) {
                    const latestImage = allMovies[0].image;
                    document.getElementById('dynamicGlobalBg').style.backgroundImage = `url('${latestImage}')`;
                }
            })
            .catch(err => {
                document.getElementById('loading').innerText = "❌ 数据库加载失败，请联系管理员";
            });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            const listTitle = document.getElementById('listTitle');
            if (!term) {
                listTitle.innerText = "✨ 最新入库";
                renderList(allMovies.slice(0, 50)); 
                return;
            }
            listTitle.innerText = "🔎 搜索结果";
            const filtered = allMovies.filter(m => m.title.toLowerCase().includes(term));
            renderList(filtered.slice(0, 100)); 
        });

        // 🌟 极简海报墙渲染逻辑
        function renderList(movies) {
            const listDiv = document.getElementById('resourceList');
            if (movies.length === 0) {
                listDiv.innerHTML = '<div id="loading">没有找到相关资源 😢</div>';
                return;
            }
            let html = "";
            movies.forEach(item => {
                let shortTitle = item.title;
                let year = "经典"; 

                // 提取年份
                const match = item.title.match(/^(.*?)(?:\s*[（\(](\d{4})[）\)])?$/);
                if (match) {
                    shortTitle = match[1].trim(); 
                    if (match[2]) {
                        year = match[2]; 
                    }
                }

                html += `
                <div class="list-item" onclick="openResource('${item.url}')">
                    <div class="item-icon-wrapper">
                        <img class="item-icon-bg" src="${item.image}" onerror="this.style.display='none'">
                        <img class="item-icon-img" src="${item.image}" alt="海报" onerror="this.onerror=null; this.src='https://placehold.co/200x300/e2e2e7/999999?text=Tgbox';">
                    </div>
                    
                    <div class="item-content">
                        <div class="item-title">${shortTitle}</div>
                        <div class="item-desc">${year}</div>
                    </div>
                </div>
                `;
            });
            listDiv.innerHTML = html;
        }

        // 完美 iOS 原生级下拉返回体验
        function openResource(url) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            tg.openLink(url, {try_instant_view: true});
        }
    </script>
</body>
</html>
