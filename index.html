<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tgbox</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #007aff);
            --secondary-bg-color: var(--tg-theme-secondary-bg-color, #f2f2f7);
            
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --title-gradient: linear-gradient(135deg, #000000 0%, #007aff 100%);
        }

        body { 
            margin: 0; background-color: var(--secondary-bg-color); color: var(--text-color); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* 🌟 全局动态环境光背景 */
        .dynamic-global-bg {
            position: fixed; top: -15%; left: -15%; width: 130%; height: 130%;
            z-index: -5; background-size: cover; background-position: center;
            filter: blur(60px) brightness(0.65) saturate(1.5); opacity: 0.6; transition: background-image 1s ease-in-out; 
        }

        .header { padding: 24px 20px 10px; }
        .header-title {
            font-size: 38px; font-weight: 800; letter-spacing: -1px;
            background: var(--title-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;
        }

        /* 🌟 主页伪装的搜索按钮 */
        .search-container { padding: 10px 20px; position: sticky; top: 0; z-index: 100; background: rgba(var(--secondary-bg-color), 0.5); }
        .search-trigger { 
            width: 100%; box-sizing: border-box; background: var(--glass-bg); border: 1px solid var(--glass-border); 
            box-shadow: var(--glass-shadow); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 20px; padding: 14px 20px; font-size: 16px; color: var(--hint-color); font-weight: 500;
            cursor: pointer; transition: transform 0.1s ease; display: flex; align-items: center;
        }
        .search-trigger:active { transform: scale(0.97); }

        .list-header { padding: 16px 24px 10px; font-size: 14px; font-weight: 600; color: var(--hint-color); }
        
        /* ========================================= */
        /* 🌟 主页专属：两列大网格海报墙 */
        /* ========================================= */
        .list-section { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; padding: 0 20px 40px; }
        .list-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.1s ease; margin-bottom: 10px; min-width: 0; }
        .list-item:active { transform: scale(0.95); }
        .item-icon-wrapper { position: relative; width: 100%; aspect-ratio: 2 / 3; border-radius: 12px; box-shadow: 0 6px 16px rgba(0,0,0,0.15); overflow: hidden; background-color: rgba(150, 150, 150, 0.15); margin-bottom: 10px; flex-shrink: 0; }
        .item-icon-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(12px) brightness(0.85); transform: scale(1.2); z-index: 1; }
        .item-icon-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 2; }
        .item-content { width: 100%; text-align: center; }
        .item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; letter-spacing: 0.5px;}
        .item-desc { font-size: 13px; color: var(--text-color); opacity: 0.65; font-weight: 600; margin-top: 2px;}

        #loading { grid-column: 1 / -1; text-align: center; padding: 40px 20px; color: var(--hint-color); font-size: 15px; font-weight: 500;}

        /* ========================================= */
        /* 🌟 悬浮搜索模态框 (使用 100dvh 完美对抗 iOS 键盘) */
        /* ========================================= */
        .search-modal {
            position: fixed; top: 0; left: 0; right: 0; 
            height: 100dvh; /* 🌟 现代规范：动态视口高度，键盘弹起自动完美适应 */
            z-index: 1000;
            background: rgba(0, 0, 0, 0.35); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; flex-direction: column; align-items: center; padding-top: 8vh;
            opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
        }
        .search-modal.active { opacity: 1; pointer-events: auto; }
        
        .search-modal-box {
            width: 90%; max-width: 500px; 
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15); 
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            overflow: hidden; display: flex; flex-direction: column; max-height: 75vh;
            transform: scale(0.95) translateY(-20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .search-modal.active .search-modal-box { transform: scale(1) translateY(0); }

        .search-modal-header { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--glass-border); }
        .search-modal-input { flex: 1; background: transparent; border: none; color: var(--text-color); font-size: 16px; outline: none; caret-color: var(--button-color);}
        .search-modal-input::placeholder { color: var(--hint-color); }
        .search-modal-close { background: rgba(150, 150, 150, 0.15); color: var(--text-color); border: none; padding: 6px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; margin-left: 12px; transition: background 0.2s;}
        .search-modal-close:active { background: rgba(150, 150, 150, 0.25); }
        .search-modal-body { padding: 16px; overflow-y: auto; flex: 1; }
        .search-placeholder-text { text-align: center; color: var(--hint-color); font-size: 14px; padding: 40px 0; font-weight: 500;}

        /* ========================================= */
        /* 🌟 搜索结果专属：强行转为迷你紧凑列表！ */
        /* ========================================= */
        .search-modal-body .list-section { display: flex; flex-direction: column; gap: 10px; padding: 4px 10px 20px; }
        .search-modal-body .list-item { flex-direction: row; align-items: center; padding: 10px; margin-bottom: 0; background: rgba(150, 150, 150, 0.08); border-radius: 16px; }
        .search-modal-body .item-icon-wrapper { width: 44px; height: 62px; aspect-ratio: auto; margin-bottom: 0; margin-right: 14px; border-radius: 8px; }
        .search-modal-body .item-content { text-align: left; }
        .search-modal-body .item-title { font-size: 14px; margin-bottom: 2px; white-space: normal; word-break: break-word; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .search-modal-body .item-desc { font-size: 12px; }
    </style>
</head>
<body>

    <div id="dynamicGlobalBg" class="dynamic-global-bg"></div>

    <div class="header">
        <div class="header-title">Tgbox</div>
    </div>
    
    <div class="search-container">
        <div class="search-trigger" id="openSearchBtn">🔍 探索影视宇宙...</div>
    </div>

    <div class="list-header">✨ 最新入库</div>
    <div class="list-section" id="resourceList">
        <div id="loading">🚀 正在连通影视数据库...</div>
    </div>

    <div id="searchModal" class="search-modal">
        <div class="search-modal-box">
            <div class="search-modal-header">
                <input type="text" id="realSearchInput" class="search-modal-input" placeholder="输入关键字开始搜索...">
                <button class="search-modal-close" id="closeSearchBtn">取消</button>
            </div>
            <div class="search-modal-body">
                <div id="searchPlaceholder" class="search-placeholder-text">等待输入关键字...</div>
                <div class="list-section" id="modalResourceList" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function applyTheme() {
            if (tg.colorScheme === 'dark') {
                document.documentElement.style.setProperty('--glass-bg', 'rgba(30, 30, 30, 0.65)');
                document.documentElement.style.setProperty('--glass-border', 'rgba(255, 255, 255, 0.08)');
                document.documentElement.style.setProperty('--glass-shadow', '0 8px 32px rgba(0, 0, 0, 0.3)');
                document.documentElement.style.setProperty('--title-gradient', 'linear-gradient(135deg, #ffffff 0%, #a8c0ff 100%)');
            } else {
                document.documentElement.style.setProperty('--glass-bg', 'rgba(255, 255, 255, 0.75)');
                document.documentElement.style.setProperty('--glass-border', 'rgba(255, 255, 255, 0.6)');
                document.documentElement.style.setProperty('--glass-shadow', '0 8px 32px rgba(0, 0, 0, 0.04)');
                document.documentElement.style.setProperty('--title-gradient', 'linear-gradient(135deg, #000000 0%, var(--button-color) 100%)');
            }
        }
        tg.onEvent('themeChanged', applyTheme);
        applyTheme(); 

        let allMovies = [];
        const dbUrl = `https://monsterboxs.github.io/tgbox-web/database.json?t=${new Date().getTime()}`;

        fetch(dbUrl)
            .then(response => {
                if (!response.ok) throw new Error("File not found");
                return response.json();
            })
            .then(data => {
                allMovies = data;
                renderList(allMovies.slice(0, 50), 'resourceList'); 
                if (allMovies.length > 0) {
                    const latestImage = allMovies[0].image;
                    document.getElementById('dynamicGlobalBg').style.backgroundImage = `url('${latestImage}')`;
                }
            })
            .catch(err => {
                document.getElementById('resourceList').innerHTML = '<div id="loading">❌ 数据库加载失败</div>';
            });

        const searchModal = document.getElementById('searchModal');
        const openSearchBtn = document.getElementById('openSearchBtn');
        const closeSearchBtn = document.getElementById('closeSearchBtn');
        const realSearchInput = document.getElementById('realSearchInput');
        const searchPlaceholder = document.getElementById('searchPlaceholder');
        const modalResourceList = document.getElementById('modalResourceList');

        // 🌟 纯净的开启逻辑，丢掉所有多余的 body 定位锁死
        openSearchBtn.addEventListener('click', () => {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            searchModal.classList.add('active');
            setTimeout(() => realSearchInput.focus(), 150); 
        });

        function closeModal() {
            searchModal.classList.remove('active');
            realSearchInput.value = ''; 
            modalResourceList.innerHTML = ''; 
            modalResourceList.style.display = 'none';
            searchPlaceholder.style.display = 'block';
        }
        closeSearchBtn.addEventListener('click', closeModal);
        searchModal.addEventListener('click', (e) => {
            if (e.target === searchModal) closeModal(); 
        });

        realSearchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            if (!term) {
                searchPlaceholder.style.display = 'block';
                modalResourceList.style.display = 'none';
                modalResourceList.innerHTML = '';
                return;
            }
            searchPlaceholder.style.display = 'none';
            modalResourceList.style.display = 'flex'; // 🌟 搜索结果强制为 flex 列表模式
            const filtered = allMovies.filter(m => m.title.toLowerCase().includes(term));
            renderList(filtered.slice(0, 100), 'modalResourceList'); 
        });

        function renderList(movies, targetId) {
            const listDiv = document.getElementById(targetId);
            if (movies.length === 0) {
                listDiv.innerHTML = '<div id="loading" style="grid-column: 1 / -1;">没有找到相关资源 😢</div>';
                return;
            }
            let html = "";
            movies.forEach(item => {
                let shortTitle = item.title;
                let year = "经典"; 
                const match = item.title.match(/^(.*?)(?:\s*[（\(](\d{4})[）\)])?$/);
                if (match) {
                    shortTitle = match[1].trim(); 
                    if (match[2]) year = match[2]; 
                }

                html += `
                <div class="list-item" onclick="openResource('${item.url}')">
                    <div class="item-icon-wrapper">
                        <img class="item-icon-bg" src="${item.image}" onerror="this.style.display='none'">
                        <img class="item-icon-img" src="${item.image}" alt="海报" onerror="this.onerror=null; this.src='https://placehold.co/200x300/e2e2e7/999999?text=Tgbox';">
                    </div>
                    <div class="item-content">
                        <div class="item-title">${shortTitle}</div>
                        <div class="item-desc">${year}</div>
                    </div>
                </div>
                `;
            });
            listDiv.innerHTML = html;
        }

        function openResource(url) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            tg.openLink(url, {try_instant_view: true});
        }
    </script>
</body>
</html>
